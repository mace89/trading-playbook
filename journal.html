<!DOCTYPE html>
<html>
<head>
<title>Journal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#030604;color:#62ff9e;}
.nav{padding:20px;border-bottom:1px solid rgba(98,255,158,0.2);text-align:center;}
.nav a{margin:0 15px;text-decoration:none;color:#62ff9e;font-weight:bold;}
.container{max-width:1000px;margin:30px auto;padding:20px;}
.card{border:1px solid rgba(98,255,158,0.3);padding:20px;margin-bottom:25px;}
input,select{width:100%;padding:10px;margin:5px 0;background:#000;border:1px solid rgba(98,255,158,0.3);color:#62ff9e;}
button{margin-top:10px;padding:12px;width:100%;background:#62ff9e;border:none;color:#030604;font-weight:bold;cursor:pointer;}
.stats{display:flex;flex-wrap:wrap;gap:10px;}
.stat{width:30%;}
.danger{background:red;color:white;}
#galleryOverlay{display:none;position:fixed;inset:0;background:black;padding:20px;z-index:9999;}
.gallery-img{max-width:100%;max-height:70vh;}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">HOME</a>
<a href="playbook.html">PLAYBOOK</a>
<a href="journal.html">JOURNAL</a>
</div>

<div class="container">

<div class="card">
<h2>Add Trade</h2>
<form id="form">
<input id="date" type="date">
<select id="play"><option>Sweep and Reap</option><option>Matrix</option></select>
<select id="market"><option>ES</option><option>NQ</option></select>
<select id="quality"><option>A+</option><option>Valid</option><option>Mistake</option></select>
<select id="status"><option>Win</option><option>Loss</option><option>BE</option></select>
<input id="r" placeholder="R Result">
<input id="pnl" placeholder="PnL ($)">
<input id="link" placeholder="TradingView Snapshot Link">
<button>Save Trade</button>
</form>
<p id="statusMsg"></p>
</div>

<div class="card">
<h2>Stats</h2>
<div class="stats">
<div class="stat">Trades: <span id="trades"></span></div>
<div class="stat">Winrate: <span id="winrate"></span></div>
<div class="stat">Total R: <span id="totalR"></span></div>
<div class="stat">Total $: <span id="totalPnl"></span></div>
<div class="stat">Profit Factor: <span id="pf"></span></div>
<div class="stat">Max DD: <span id="dd"></span></div>
</div>
</div>

<div class="card">
<h2>Gallery</h2>
<button id="openGallery">Open Gallery</button>
</div>

</div>

<div id="galleryOverlay">
<select id="gPlay"><option>All</option><option>Sweep and Reap</option><option>Matrix</option></select>
<select id="gStatus"><option>All</option><option>Win</option><option>Loss</option></select>
<button id="prev">Prev</button>
<button id="next">Next</button>
<button id="close">Close</button>
<br><br>
<img id="gImg" class="gallery-img">
<div id="gInfo"></div>
</div>

<script>
const client = supabase.createClient(
"https://ebdyavzqraejwrvaclfg.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViZHlhdnpxcmFlandydmFjbGZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk3NDQsImV4cCI6MjA5MjU0NTc0NH0.zGUhhBt86s2bWhGz4HlCgljGKWnpHIeH7eobCdFWUTg"
);

let trades=[],gTrades=[],i=0;

function today(){
document.getElementById("date").value=new Date().toISOString().split("T")[0];
}

document.getElementById("form").onsubmit=async e=>{
e.preventDefault();

await client.from("trades").insert([{
trade_date:date.value,
play:play.value,
market:market.value,
quality:quality.value,
status:status.value,
result_r:Number(r.value),
pnl:Number(pnl.value),
image_url:link.value
}]);

today();
load();
};

async function load(){
let {data}=await client.from("trades").select("*");
trades=data||[];

calcStats();
}

function calcStats(){
let total=trades.length;
let wins=trades.filter(t=>t.result_r>0);
let losses=trades.filter(t=>t.result_r<0);

let totalR=trades.reduce((a,b)=>a+(b.result_r||0),0);
let totalPnl=trades.reduce((a,b)=>a+(b.pnl||0),0);

let pf = losses.length ? 
(wins.reduce((a,b)=>a+b.result_r,0)/Math.abs(losses.reduce((a,b)=>a+b.result_r,0))).toFixed(2) : 0;

let equity=0,max=0,dd=0;
trades.forEach(t=>{
equity+=t.result_r||0;
if(equity>max) max=equity;
let d=max-equity;
if(d>dd) dd=d;
});

tradesEl.innerText=total;
winrate.innerText=(total?(wins.length/total*100).toFixed(1):0)+"%";
totalREl.innerText=totalR.toFixed(2);
totalPnlEl.innerText="$"+totalPnl.toFixed(2);
pfEl.innerText=pf;
ddEl.innerText=dd.toFixed(2);
}

openGallery.onclick=()=>{
galleryOverlay.style.display="block";
filterGallery();
};

close.onclick=()=>galleryOverlay.style.display="none";

gPlay.onchange=filterGallery;
gStatus.onchange=filterGallery;

function filterGallery(){
gTrades=trades.filter(t=>t.image_url);

if(gPlay.value!="All")
gTrades=gTrades.filter(t=>t.play==gPlay.value);

if(gStatus.value!="All")
gTrades=gTrades.filter(t=>t.status==gStatus.value);

i=0;
show();
}

function show(){
if(!gTrades.length)return;

let t=gTrades[i];

gImg.src=t.image_url;
gInfo.innerHTML=`${t.trade_date} | ${t.play} | ${t.status} | $${t.pnl}`;
}

prev.onclick=()=>{i=(i-1+gTrades.length)%gTrades.length;show();}
next.onclick=()=>{i=(i+1)%gTrades.length;show();}

today();
load();
</script>

</body>
</html>
<!-- FULL SCRIPT END -->
