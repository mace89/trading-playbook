<!DOCTYPE html>
<html>
<head>
  <title>Journal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#030604; color:#62ff9e; }
    .nav { padding:20px; border-bottom:1px solid rgba(98,255,158,0.2); text-align:center; }
    .nav a { margin:0 15px; text-decoration:none; color:#62ff9e; font-weight:bold; }
    h1 { text-align:center; margin-top:30px; }
    .container { max-width:1000px; margin:30px auto; padding:20px; }
    .card { border:1px solid rgba(98,255,158,0.3); padding:20px; margin-bottom:25px; }
    input, select { width:100%; padding:10px; margin:5px 0; background:#000; border:1px solid rgba(98,255,158,0.3); color:#62ff9e; }
    button { margin-top:10px; padding:12px; width:100%; background:#62ff9e; border:none; color:#030604; font-weight:bold; cursor:pointer; }
    .danger { background:#ff4d4d; color:#fff; }
    .stats { display:flex; justify-content:space-between; flex-wrap:wrap; }
    .stat { width:30%; margin-bottom:15px; }
    ul { padding-left:20px; }
    li { margin-bottom:5px; }
    a { color:#62ff9e; }

    .gallery-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
      gap:20px;
    }

    .gallery-card {
      border:1px solid rgba(98,255,158,0.3);
      padding:12px;
      background:#000;
    }

    .gallery-card img {
      width:100%;
      border:1px solid rgba(98,255,158,0.3);
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="index.html">HOME</a>
  <a href="playbook.html">PLAYBOOK</a>
  <a href="journal.html">JOURNAL</a>
  <a href="#gallery">GALLERY</a>
</div>

<h1>TRADING JOURNAL</h1>

<div class="container">

  <div class="card">
    <h2>Add Trade</h2>

    <form id="form">
      <input id="date" type="date">

      <select id="play">
        <option>Sweep and Reap</option>
        <option>Matrix</option>
      </select>

      <select id="market">
        <option>ES</option>
        <option>NQ</option>
      </select>

      <select id="quality">
        <option>A+</option>
        <option>Valid</option>
        <option>Missing / Mistake</option>
      </select>

      <select id="status">
        <option>Win</option>
        <option>Loss</option>
        <option>BE</option>
      </select>

      <input id="r" placeholder="Result (R)">
      <input id="link" placeholder="TradingView Snapshot Link">

      <button type="submit">Save Trade</button>
    </form>

    <p id="statusMsg">Ready</p>
  </div>

  <div class="card">
    <h2>Filters</h2>

    <select id="filterPlay">
      <option value="All">All Plays</option>
      <option value="Sweep and Reap">Sweep and Reap</option>
      <option value="Matrix">Matrix</option>
    </select>

    <select id="filterMarket">
      <option value="All">All Markets</option>
      <option value="ES">ES</option>
      <option value="NQ">NQ</option>
    </select>

    <select id="filterQuality">
      <option value="All">All Quality</option>
      <option value="A+">A+</option>
      <option value="Valid">Valid</option>
      <option value="Missing / Mistake">Missing / Mistake</option>
    </select>
  </div>

  <div class="card">
    <h2>Stats</h2>

    <div class="stats">
      <div class="stat">Trades: <span id="trades">0</span></div>
      <div class="stat">Winrate: <span id="winrate">0%</span></div>
      <div class="stat">Total R: <span id="totalR">0</span></div>
    </div>
  </div>

  <div class="card">
    <h2>Overall Equity Curve</h2>
    <canvas id="equityChart"></canvas>
  </div>

  <div class="card">
    <h2>Separate Equity Curves</h2>
    <canvas id="playChart"></canvas>
  </div>

  <div class="card">
    <h2>Trades</h2>
    <ul id="list"></ul>
  </div>

  <div class="card" id="gallery">
    <h2>Trade Gallery</h2>
    <div id="galleryGrid" class="gallery-grid"></div>
  </div>

  <div class="card">
    <h2>Danger Zone</h2>
    <button class="danger" id="clearBtn">Clear All Trade Data</button>
  </div>

</div>

<script>
const SUPABASE_URL = "https://ebdyavzqraejwrvaclfg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViZHlhdnpxcmFlandydmFjbGZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk3NDQsImV4cCI6MjA5MjU0NTc0NH0.zGUhhBt86s2bWhGz4HlCgljGKWnpHIeH7eobCdFWUTg";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById("form");
const statusMsg = document.getElementById("statusMsg");
const filterPlay = document.getElementById("filterPlay");
const filterMarket = document.getElementById("filterMarket");
const filterQuality = document.getElementById("filterQuality");
const clearBtn = document.getElementById("clearBtn");

let equityChart = null;
let playChart = null;
let allTrades = [];

function setTodayDate(){
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("date").value = today;
}

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  statusMsg.innerText = "Saving...";

  const trade = {
    trade_date: document.getElementById("date").value,
    play: document.getElementById("play").value,
    market: document.getElementById("market").value,
    quality: document.getElementById("quality").value,
    direction: "Long",
    status: document.getElementById("status").value,
    result_r: Number(document.getElementById("r").value),
    image_url: document.getElementById("link").value
  };

  const { error } = await client.from("trades").insert([trade]);

  if(error){
    statusMsg.innerText = error.message;
    return;
  }

  statusMsg.innerText = "Trade saved";
  form.reset();
  setTodayDate();
  load();
});

filterPlay.addEventListener("change", applyFilters);
filterMarket.addEventListener("change", applyFilters);
filterQuality.addEventListener("change", applyFilters);

clearBtn.addEventListener("click", async ()=>{
  const sure = confirm("Are you sure you want to delete ALL trade data? This cannot be undone.");

  if(!sure){
    return;
  }

  const reallySure = confirm("Final warning: this will permanently delete every trade. Continue?");

  if(!reallySure){
    return;
  }

  const { error } = await client
    .from("trades")
    .delete()
    .neq("id", 0);

  if(error){
    alert("Error: " + error.message);
    return;
  }

  alert("All trade data cleared.");
  load();
});

async function load(){
  const { data, error } = await client
    .from("trades")
    .select("*")
    .order("trade_date", { ascending: true });

  if(error){
    statusMsg.innerText = error.message;
    return;
  }

  allTrades = data || [];
  applyFilters();
}

function applyFilters(){
  let filtered = [...allTrades];

  if(filterPlay.value !== "All"){
    filtered = filtered.filter(t => t.play === filterPlay.value);
  }

  if(filterMarket.value !== "All"){
    filtered = filtered.filter(t => t.market === filterMarket.value);
  }

  if(filterQuality.value !== "All"){
    filtered = filtered.filter(t => t.quality === filterQuality.value);
  }

  updateStats(filtered);
  updateList(filtered);
  updateGallery(filtered);
  drawOverallChart(filtered);
  drawSeparatePlayChart(filtered);
}

function updateStats(data){
  let total = data.length;
  let wins = data.filter(t => Number(t.result_r) > 0);
  let totalR = data.reduce((sum,t)=>sum + Number(t.result_r || 0),0);
  let winrate = total ? ((wins.length / total) * 100).toFixed(1) : 0;

  document.getElementById("trades").innerText = total;
  document.getElementById("winrate").innerText = winrate + "%";
  document.getElementById("totalR").innerText = totalR.toFixed(2);
}

function updateList(data){
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(t=>{
    const li = document.createElement("li");
    li.innerHTML = `
      ${t.trade_date} | ${t.play} | ${t.market} | ${t.quality || "No Tag"} | ${t.result_r}R |
      <a href="${t.image_url}" target="_blank">Chart</a>
    `;
    list.appendChild(li);
  });
}

function updateGallery(data){
  const gallery = document.getElementById("galleryGrid");
  gallery.innerHTML = "";

  data.forEach(t=>{
    if(!t.image_url){
      return;
    }

    const card = document.createElement("div");
    card.className = "gallery-card";

    card.innerHTML = `
      <img src="${t.image_url}" alt="Trade chart" onerror="this.style.display='none'">
      <p>${t.trade_date} | ${t.play} | ${t.market}</p>
      <p>${t.quality || "No Tag"} | ${t.result_r}R</p>
      <a href="${t.image_url}" target="_blank">Open Chart</a>
    `;

    gallery.appendChild(card);
  });
}

function drawOverallChart(trades){
  const sorted = [...trades].sort((a,b)=> new Date(a.trade_date) - new Date(b.trade_date));

  let equity = 0;
  const labels = [];
  const data = [];

  sorted.forEach(t=>{
    equity += Number(t.result_r || 0);
    labels.push(t.trade_date);
    data.push(equity);
  });

  const ctx = document.getElementById("equityChart");

  if(equityChart){
    equityChart.destroy();
  }

  equityChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Overall Equity (R)",
        data: data,
        borderColor: "#62ff9e",
        backgroundColor: "rgba(98,255,158,0.15)",
        tension: 0.25
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#62ff9e" } } },
      scales: {
        x: { ticks: { color: "#62ff9e" }, grid: { color: "rgba(98,255,158,0.1)" } },
        y: { ticks: { color: "#62ff9e" }, grid: { color: "rgba(98,255,158,0.1)" } }
      }
    }
  });
}

function drawSeparatePlayChart(trades){
  const sorted = [...trades].sort((a,b)=> new Date(a.trade_date) - new Date(b.trade_date));

  let sweepEquity = 0;
  let matrixEquity = 0;

  const labels = [];
  const sweepData = [];
  const matrixData = [];

  sorted.forEach(t=>{
    labels.push(t.trade_date);

    if(t.play === "Sweep and Reap"){
      sweepEquity += Number(t.result_r || 0);
    }

    if(t.play === "Matrix"){
      matrixEquity += Number(t.result_r || 0);
    }

    sweepData.push(sweepEquity);
    matrixData.push(matrixEquity);
  });

  const ctx = document.getElementById("playChart");

  if(playChart){
    playChart.destroy();
  }

  playChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {
          label: "Sweep and Reap",
          data: sweepData,
          borderColor: "#62ff9e",
          backgroundColor: "rgba(98,255,158,0.10)",
          tension: 0.25
        },
        {
          label: "Matrix",
          data: matrixData,
          borderColor: "#ffffff",
          backgroundColor: "rgba(255,255,255,0.10)",
          tension: 0.25
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#62ff9e" } } },
      scales: {
        x: { ticks: { color: "#62ff9e" }, grid: { color: "rgba(98,255,158,0.1)" } },
        y: { ticks: { color: "#62ff9e" }, grid: { color: "rgba(98,255,158,0.1)" } }
      }
    }
  });
}

setTodayDate();
load();
</script>

</body>
</html>
