<!DOCTYPE html>
<html>
<head>
  <title>Journal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#030604; color:#62ff9e; }
.nav { padding:20px; border-bottom:1px solid rgba(98,255,158,0.2); text-align:center; }
.nav a { margin:0 15px; text-decoration:none; color:#62ff9e; font-weight:bold; }
h1 { text-align:center; margin-top:30px; }
.container { max-width:1000px; margin:30px auto; padding:20px; }
.card { border:1px solid rgba(98,255,158,0.3); padding:20px; margin-bottom:25px; }

label {
  display:block;
  margin-top:10px;
  margin-bottom:3px;
  font-size:14px;
  opacity:0.8;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#000;
  border:1px solid rgba(98,255,158,0.3);
  color:#62ff9e;
}

button {
  margin-top:10px;
  padding:12px;
  width:100%;
  background:#62ff9e;
  border:none;
  color:#030604;
  font-weight:bold;
  cursor:pointer;
}

.danger { background:#ff4d4d; color:#fff; }

.stats {
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}

.stat {
  width:30%;
  margin-bottom:15px;
}

ul { padding-left:20px; }
li { margin-bottom:5px; }
a { color:#62ff9e; }

/* GALLERY */
#galleryOverlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.96);
  z-index:9999;
  padding:20px;
}

.gallery-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.gallery-controls {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.gallery-controls button,
.gallery-controls select {
  width:auto;
  min-width:140px;
}

.gallery-image-wrap {
  display:flex;
  align-items:center;
  justify-content:center;
  height:70vh;
  border:1px solid rgba(98,255,158,0.3);
  background:#000;
}

#galleryImage {
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

#galleryInfo {
  margin-top:15px;
  text-align:center;
}

.close-btn {
  width:auto;
  background:#ff4d4d;
  color:white;
  padding:10px 18px;
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">HOME</a>
  <a href="playbook.html">PLAYBOOK</a>
  <a href="journal.html">JOURNAL</a>
</div>

<h1>TRADING JOURNAL</h1>

<div class="container">

<div class="card">
<h2>Add Trade</h2>

<form id="form">

<label>Date</label>
<input id="date" type="date">

<label>Entry Time</label>
<input id="entry_time" type="time">

<label>Play</label>
<select id="play">
<option>Sweep and Reap</option>
<option>Matrix</option>
</select>

<label>Instrument</label>
<select id="market">
<option>ES</option>
<option>NQ</option>
</select>

<label>Trade Quality</label>
<select id="quality">
<option>A+</option>
<option>Valid</option>
<option>Missing / Mistake</option>
</select>

<label>Result</label>
<select id="status">
<option>Win</option>
<option>Loss</option>
<option>BE</option>
</select>

<label>Result (R)</label>
<input id="r">

<label>PnL ($)</label>
<input id="pnl">

<label>TradingView Snapshot</label>
<input id="link">

<button type="submit">Save Trade</button>

</form>

<p id="statusMsg">Ready</p>
</div>

<div class="card">
<h2>Stats</h2>

<div class="stats">
<div class="stat">Trades: <span id="trades">0</span></div>
<div class="stat">Winrate: <span id="winrate">0%</span></div>
<div class="stat">Total R: <span id="totalR">0</span></div>
<div class="stat">Total PnL: <span id="totalPnl">$0</span></div>
<div class="stat">Profit Factor: <span id="profitFactor">0</span></div>
<div class="stat">Max Drawdown: <span id="maxDrawdown">$0</span></div>
<div class="stat">Expectancy: <span id="expectancy">$0</span></div>
</div>
</div>

<div class="card">
<h2>Trade Gallery</h2>
<button id="openGalleryBtn">Open Trade Gallery</button>
</div>

<div class="card">
<h2>Trades</h2>
<ul id="list"></ul>
</div>

<div class="card">
<h2>Danger Zone</h2>
<button class="danger" id="clearBtn">Clear All Trade Data</button>
</div>

</div>

<!-- GALLERY -->
<div id="galleryOverlay">

<div class="gallery-top">
<h2>TRADE GALLERY</h2>
<button class="close-btn" id="closeGalleryBtn">Close</button>
</div>

<div class="gallery-controls">
<select id="galleryFilterPlay">
<option value="All">All</option>
<option>Sweep and Reap</option>
<option>Matrix</option>
</select>

<select id="galleryFilterStatus">
<option value="All">All</option>
<option>Win</option>
<option>Loss</option>
<option>BE</option>
</select>

<button id="prevGalleryBtn">Prev</button>
<button id="nextGalleryBtn">Next</button>
</div>

<div class="gallery-image-wrap">
<img id="galleryImage">
</div>

<div id="galleryInfo"></div>

</div>

<script>
const client = supabase.createClient(
"https://ebdyavzqraejwrvaclfg.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViZHlhdnpxcmFlandydmFjbGZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk3NDQsImV4cCI6MjA5MjU0NTc0NH0.zGUhhBt86s2bWhGz4HlCgljGKWnpHIeH7eobCdFWUTg"
);

let allTrades=[], galleryTrades=[], index=0;

function today(){
document.getElementById("date").value=new Date().toISOString().split("T")[0];
}

form.onsubmit=async e=>{
e.preventDefault();

await client.from("trades").insert([{
trade_date:date.value,
entry_time:entry_time.value,
play:play.value,
market:market.value,
quality:quality.value,
status:status.value,
result_r:Number(r.value),
pnl:Number(pnl.value),
image_url:link.value
}]);

today();
load();
};

async function load(){
let {data}=await client.from("trades").select("*");
allTrades=data||[];
stats();
list();
}

function stats(){
let t=allTrades;
let total=t.length;
let wins=t.filter(x=>x.pnl>0);
let losses=t.filter(x=>x.pnl<0);

let totalPnl=t.reduce((a,b)=>a+(b.pnl||0),0);

let pf = losses.length ? 
(wins.reduce((a,b)=>a+b.pnl,0)/Math.abs(losses.reduce((a,b)=>a+b.pnl,0))).toFixed(2) : 0;

let expectancy = total ? totalPnl/total : 0;

let equity=0,max=0,dd=0;
t.forEach(x=>{
equity+=x.pnl||0;
if(equity>max) max=equity;
dd=Math.max(dd,max-equity);
});

trades.innerText=total;
winrate.innerText=(total?(wins.length/total*100).toFixed(1):0)+"%";
totalR.innerText=t.reduce((a,b)=>a+(b.result_r||0),0).toFixed(2);
totalPnl.innerText="$"+totalPnl.toFixed(2);
profitFactor.innerText=pf;
maxDrawdown.innerText="$"+dd.toFixed(2);
expectancy.innerText="$"+expectancy.toFixed(2);
}

function list(){
list.innerHTML="";
allTrades.forEach(t=>{
let li=document.createElement("li");
li.innerHTML=`${t.trade_date} ${t.entry_time||""} | ${t.play} | ${t.status} | $${t.pnl}`;
list.appendChild(li);
});
}

openGalleryBtn.onclick=()=>{
galleryOverlay.style.display="block";
filterGallery();
};

closeGalleryBtn.onclick=()=>galleryOverlay.style.display="none";

galleryFilterPlay.onchange=filterGallery;
galleryFilterStatus.onchange=filterGallery;

function filterGallery(){
galleryTrades=allTrades.filter(t=>t.image_url);

if(galleryFilterPlay.value!="All")
galleryTrades=galleryTrades.filter(t=>t.play==galleryFilterPlay.value);

if(galleryFilterStatus.value!="All")
galleryTrades=galleryTrades.filter(t=>t.status==galleryFilterStatus.value);

index=0;
show();
}

function show(){
if(!galleryTrades.length)return;
let t=galleryTrades[index];
galleryImage.src=t.image_url;
galleryInfo.innerHTML=`${t.trade_date} | ${t.play} | ${t.status} | $${t.pnl}`;
}

prevGalleryBtn.onclick=()=>{index=(index-1+galleryTrades.length)%galleryTrades.length;show();}
nextGalleryBtn.onclick=()=>{index=(index+1)%galleryTrades.length;show();}

today();
load();
</script>

</body>
</html>
