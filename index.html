<script>
const SUPABASE_URL = "https://ebdyavzqraejwrvaclfg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViZHlhdnpxcmFlandydmFjbGZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk3NDQsImV4cCI6MjA5MjU0NTc0NH0.zGUhhBt86s2bWhGz4HlCgljGKWnpHIeH7eobCdFWUTg";

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById("tradeForm");
const statusMessage = document.getElementById("statusMessage");

document.getElementById("trade_date").valueAsDate = new Date();

function setStatus(message){
  statusMessage.textContent = message;
}

form.addEventListener("submit", async (event)=>{
  event.preventDefault();

  try{
    setStatus("Saving trade...");

    const trade = {
      trade_date: document.getElementById("trade_date").value,
      play: document.getElementById("play").value,
      market: document.getElementById("market").value,
      direction: document.getElementById("direction").value,
      status: document.getElementById("status").value,
      result_r: Number(document.getElementById("result_r").value || 0),
      entry_price: document.getElementById("entry_price").value || null,
      stop_price: document.getElementById("stop_price").value || null,
      target_price: document.getElementById("target_price").value || null,
      pnl: Number(document.getElementById("pnl").value || 0),
      notes: document.getElementById("notes").value,
      image_url: document.getElementById("chart_link").value || null
    };

    const { error } = await client.from("trades").insert([trade]);

    if(error){
      console.error(error);
      setStatus("Error: " + error.message);
      return;
    }

    setStatus("Trade saved.");

    form.reset();
    document.getElementById("trade_date").valueAsDate = new Date();

    loadTrades();

  } catch(err){
    console.error(err);
    setStatus("Error: " + err.message);
  }
});

async function loadTrades(){
  const { data, error } = await client
    .from("trades")
    .select("*")
    .order("trade_date", { ascending: false });

  if(error){
    console.error(error);
    return;
  }

  renderStats(data);
  renderTable(data);
}

function renderStats(trades){
  const closed = trades.filter(t => t.status !== "Open");

  const wins = closed.filter(t => t.result_r > 0);
  const losses = closed.filter(t => t.result_r < 0);

  const total = closed.length;
  const totalR = closed.reduce((sum, t) => sum + Number(t.result_r || 0), 0);

  const winRate = total ? (wins.length / total) * 100 : 0;
  const avgR = total ? totalR / total : 0;

  const grossProfit = wins.reduce((sum, t) => sum + t.result_r, 0);
  const grossLoss = Math.abs(losses.reduce((sum, t) => sum + t.result_r, 0));

  const profitFactor = grossLoss ? grossProfit / grossLoss : 0;

  document.getElementById("totalTrades").textContent = total;
  document.getElementById("winRate").textContent = winRate.toFixed(1) + "%";
  document.getElementById("totalR").textContent = totalR.toFixed(2);
  document.getElementById("avgR").textContent = avgR.toFixed(2);
  document.getElementById("profitFactor").textContent = profitFactor.toFixed(2);
}

function renderTable(trades){
  const tbody = document.getElementById("tradesTable");
  tbody.innerHTML = "";

  trades.slice(0, 50).forEach(t => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${t.trade_date || ""}</td>
      <td>${t.play || ""}</td>
      <td>${t.market || ""}</td>
      <td>${t.direction || ""}</td>
      <td>${t.status || ""}</td>
      <td>${Number(t.result_r || 0).toFixed(2)}</td>
      <td>${Number(t.pnl || 0).toFixed(2)}</td>
      <td>${t.image_url ? `<a href="${t.image_url}" target="_blank">Open Chart</a>` : ""}</td>
      <td>${t.notes || ""}</td>
    `;

    tbody.appendChild(row);
  });
}

loadTrades();
</script>
</script>
</body>
</html>
